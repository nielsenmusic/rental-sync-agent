name: Rental Calendar Sync

on:
  schedule:
    - cron: '0 7 * * *'   # Runs every day at 7:00 AM UTC (8:00 AM Danish time)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    # Allow the workflow to write back to the repository (to save master.ics and sync-log.md)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/CalendarSyncAgent.csproj

      - name: Build
        run: dotnet build src/CalendarSyncAgent.csproj --configuration Release --no-restore

      - name: Run sync agent
        env:
          AIRBNB_ICAL_URL:  ${{ secrets.AIRBNB_ICAL_URL }}
          BOOKING_ICAL_URL: ${{ secrets.BOOKING_ICAL_URL }}
        run: dotnet run --project src/CalendarSyncAgent.csproj --configuration Release

      - name: Commit and push updated calendar and log
        run: |
          git config user.name  "Rental Sync Agent"
          git config user.email "agent@noreply.github.com"
          git add docs/master.ics sync-log.md
          git diff --staged --quiet || git commit -m "chore: daily calendar sync $(date +'%Y-%m-%d')"
          git push
